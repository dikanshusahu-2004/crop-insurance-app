<!DOCTYPE html>
<html>

<head>
  <title>Patwari Dashboard</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: linear-gradient(to right, #d4fc79, #96e6a1);
    }

    .card {
      border-radius: 15px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .btn-verify {
      background: #ff9800;
      color: white;
    }

    .btn-verify:hover {
      background: #e68900;
    }

    .status {
      font-weight: bold;
    }

    .pending {
      color: orange;
    }

    .approved {
      color: green;
    }
  </style>

</head>

<body>

<div class="container mt-5">

  <div class="card shadow p-4">

    <div class="header mb-3">
      <h3 class="text-success">👨‍🌾 Patwari Dashboard</h3>
      <button class="btn btn-danger" onclick="logout()">Logout</button>
    </div>

    <table class="table table-bordered text-center">

      <thead class="table-dark">
        <tr>
          <th>Name</th>
          <th>Mobile</th>
          <th>Village</th>
          <th>Status</th>
          <th>Action</th>
        </tr>
      </thead>

      <tbody id="data"></tbody>

    </table>

  </div>

</div>

<script>

async function loadData(){

  const res = await fetch("https://crop-insurance-app.onrender.com/api/claim");
  const data = await res.json();

  let output = "";

  data.forEach(item => {

    const statusClass = item.status.patwari === "Approved" ? "approved" : "pending";

    output += `
      <tr>
        <td>${item.name || "N/A"}</td>
        <td>${item.mobile || "N/A"}</td>
        <td>${item.village || "N/A"}</td>

        <td class="status ${statusClass}">
          ${item.status.patwari}
        </td>

        <td>
          <button class="btn btn-verify" onclick="verify('${item._id}')">
            Verify
          </button>
        </td>
      </tr>
    `;
  });

  document.getElementById("data").innerHTML = output;
}

function verify(id){
  window.location.href = `verify.html?id=${id}`;
}

function logout(){
  localStorage.removeItem("role");
  window.location.href = "patwari-login.html";
}

loadData();

</script>

</body>
</html>
