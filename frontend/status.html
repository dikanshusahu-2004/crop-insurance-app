<!DOCTYPE html>
<html>
<head>
  <title>Claim Status</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: linear-gradient(to right, #e3f2fd, #ffffff);
      font-family: Arial;
    }

    .card {
      border-radius: 15px;
    }

    .status-pending {
      color: orange;
      font-weight: bold;
    }

    .status-approved {
      color: green;
      font-weight: bold;
    }

    .status-rejected {
      color: red;
      font-weight: bold;
    }

    table img {
      border-radius: 8px;
    }
  </style>

</head>

<body>

<div class="container mt-5">

  <div class="card shadow p-4">

    <h2 class="text-center text-primary mb-4">📊 Claim Status Dashboard</h2>

    <button onclick="loadStatus()" class="btn btn-success mb-3 w-100">
      🔄 Load Status
    </button>

    <div class="table-responsive">
      <table class="table table-bordered table-hover text-center">

        <thead class="table-dark">
          <tr>
            <th>Name</th>
            <th>Patwari</th>
            <th>Insurance</th>
            <th>Bank</th>
          </tr>
        </thead>

        <tbody id="tableBody">
          <tr>
            <td colspan="4">Click "Load Status"</td>
          </tr>
        </tbody>

      </table>
    </div>

  </div>

</div>

<script>

function getStatusClass(status) {
  if (status === "Approved") return "status-approved";
  if (status === "Rejected") return "status-rejected";
  return "status-pending";
}

async function loadStatus() {
    try {

        const res = await fetch("https://crop-insurance-app.onrender.com/api/claim");
        const data = await res.json();

        let output = "";

        data.forEach(item => {

            output += `
                <tr>
                    <td>${item.name || "No Name"}</td>

                    <td class="${getStatusClass(item.status.patwari)}">
                      ${item.status.patwari}
                    </td>

                    <td class="${getStatusClass(item.status.insurance)}">
                      ${item.status.insurance}
                    </td>

                    <td class="${getStatusClass(item.status.bank)}">
                      ${item.status.bank}
                    </td>
                </tr>
            `;
        });

        document.getElementById("tableBody").innerHTML = output;

    } catch (err) {
        console.error(err);
        alert("Error loading data ❌");
    }
}

</script>

</body>
</html>
