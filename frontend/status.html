<!DOCTYPE html>
<html>
<head>
  <title>Claim Status</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
    }

    table {
      margin: auto;
      border-collapse: collapse;
      width: 80%;
    }

    th {
      background: black;
      color: white;
      padding: 10px;
    }

    td {
      padding: 10px;
      border: 1px solid gray;
    }
  </style>
</head>

<body>

<h2>📊 Claim Status</h2>

<button onclick="loadStatus()">Load Status</button>

<br><br>

<table>
  <thead>
    <tr>
      <th>Name</th>
      <th>Patwari</th>
      <th>Insurance</th>
      <th>Bank</th>
    </tr>
  </thead>

  <tbody id="tableBody">
    <tr>
      <td colspan="4">Click "Load Status"</td>
    </tr>
  </tbody>
</table>

<script>

async function loadStatus() {
    try {

        const res = await fetch("https://crop-insurance-app.onrender.com/api/claim");

        const data = await res.json();

        console.log("DATA:", data);

        let output = "";

        data.forEach(item => {
            output += `
                <div style="border:1px solid #ccc; padding:10px; margin:10px;">
                    <b>Name:</b> ${item.name} <br>
                    <b>Mobile:</b> ${item.mobile} <br>
                    <b>Status:</b> 
                        Patwari: ${item.status.patwari} | 
                        Insurance: ${item.status.insurance} | 
                        Bank: ${item.status.bank}
                </div>
            `;
        });

        document.getElementById("result").innerHTML = output;

    } catch (err) {
        console.error(err);
        alert("Error loading data ❌");
    }
}

</script>
</body>
</html>
