<!DOCTYPE html>
<html>

<head>
<title>Insurance Verification</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body { background:#f5f7fa; }
.card { border-radius:12px; }
img { border-radius:10px; margin-top:10px; }
</style>

</head>

<body>

<div class="container mt-4">
<div class="card shadow p-4">

<h3 class="text-primary mb-3">🏢 Insurance Verification</h3>

<!-- Farmer Details -->
<h5 class="text-success">Farmer Details</h5>
<p><b>Name:</b> <span id="name"></span></p>
<p><b>Mobile:</b> <span id="mobile"></span></p>
<p><b>Village:</b> <span id="village"></span></p>
<p><b>Crop:</b> <span id="crop"></span></p>

<h5 class="text-warning">Land Details</h5>
<p><b>Land Area:</b> <span id="land"></span></p>

<h5 class="text-info">Bank Details</h5>
<p><b>Bank:</b> <span id="bank"></span></p>
<p><b>Account:</b> <span id="account"></span></p>
<p><b>IFSC:</b> <span id="ifsc"></span></p>

<h5 class="text-dark">Insurance Details</h5>
<p><b>Policy:</b> <span id="policy"></span></p>
<p><b>Sum Insured:</b> <span id="sum"></span></p>

<hr>

<!-- Farmer Image -->
<h5 class="text-danger">Farmer Image</h5>
<img id="farmerImage" width="250">

<hr>

<!-- Patwari Image -->
<h5 class="text-primary">Patwari Verification Image</h5>
<img id="patwariImage" width="250">

<hr>

<p><strong>📝 Patwari Notes:</strong> <span id="notes"></span></p>

<p><strong>🌾 Actual Yield:</strong> <span id="yield"></span></p>
<!-- Insurance Action -->
<button onclick="approve()" class="btn btn-success w-100 mt-2">
Approve Claim
</button>

<button onclick="reject()" class="btn btn-danger w-100 mt-2">
Reject Claim
</button>

<a href="insurance-dashboard.html" class="btn btn-secondary w-100 mt-2">
Back
</a>

</div>
</div>

<script>

const params = new URLSearchParams(window.location.search);
const id = params.get("id");

console.log("INSURANCE ID:", id);

async function loadDetails(){
  const res = await fetch(
  `https://crop-insurance-app.onrender.com/api/claim/${id}`
);

  const item = await res.json();

  if(!item){
    alert("Data not found ❌");
    return;
  }

  console.log("FULL ITEM:", item);

  document.getElementById("name").innerText = item.name;
  document.getElementById("mobile").innerText = item.mobile;
  document.getElementById("village").innerText = item.village;
  document.getElementById("crop").innerText = item.crop_name;

  document.getElementById("land").innerText = item.land_area;

  document.getElementById("bank").innerText = item.bank_name;
  document.getElementById("account").innerText = item.account_number;
  document.getElementById("ifsc").innerText = item.ifsc_code;

  document.getElementById("policy").innerText = item.policy_number;
  document.getElementById("sum").innerText = item.sum_insured;

  document.getElementById("notes").innerText =
    item.patwariNotes || "Not available";

  document.getElementById("yield").innerText =
    item.actualYield || "Not available";

  const base = "https://crop-insurance-app.onrender.com/uploads/";

  if(item.image){
    document.getElementById("farmerImage").src = base + item.image;
  }

  if(item.verify_image){
    document.getElementById("patwariImage").src = base + item.verify_image;
  }
}
 

// ✅ APPROVE
async function approve(){

  await fetch(
    `https://crop-insurance-app.onrender.com/api/claim/insurance/${id}`,
    { method: "PUT" }
  );

  alert("Insurance Approved ✅");
  window.location.href = "insurance-dashboard.html";
}

// ❌ REJECT
async function reject(){

  alert("Claim Rejected ❌ (logic add karna ho to batao)");
  window.location.href = "insurance-dashboard.html";
}

loadDetails();

</script>

</body>
</html>
