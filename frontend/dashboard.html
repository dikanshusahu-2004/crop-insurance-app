<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dashboard - Crop Insurance</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: #f5f7fa;
    }

    .card {
      border-radius: 15px;
    }

    h2 {
      font-weight: bold;
    }
  </style>
</head>
<body>

<div class="container mt-5">

  <h2 class="text-center mb-4">📊 Crop Insurance Dashboard</h2>

  <div class="card p-4 shadow">

    <button onclick="loadClaims()" class="btn btn-primary mb-3">
      🔄 Load Claims
    </button>

    <table class="table table-bordered table-hover">
      <thead class="table-dark">
        <tr>
          <th>Name</th>
          <th>Mobile</th>
          <th>Aadhaar</th>
          <th>Status</th>
        </tr>
      </thead>

      <tbody id="tableData">
        <tr>
          <td colspan="4" class="text-center">Click "Load Claims"</td>
        </tr>
      </tbody>
    </table>

  </div>

</div>

<script>
async function loadClaims() {
  try {
    const res = await fetch("http://localhost:5000/api/claim");

    if (!res.ok) {
      throw new Error("Server error");
    }

    const data = await res.json();

    let html = "";

    if (data.length === 0) {
      html = <tr><td colspan="4" class="text-center">No Data Found</td></tr>;
    } else {
      data.forEach(item => {
        html += `
          <tr>
            <td>${item.name}</td>
            <td>${item.mobile}</td>
            <td>${item.aadhaar}</td>
            <td>
              <span class="badge bg-warning text-dark">
                ${item.status}
              </span>
            </td>
          </tr>
        `;
      });
    }

    document.getElementById("tableData").innerHTML = html;

  } catch (err) {
    console.error(err);
    alert("Failed to load data ❌");
  }
}
</script>

</body>
</html>
