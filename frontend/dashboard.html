<!DOCTYPE html>
<html>
<head>
    <title>PMFBY Dashboard</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(135deg, #43cea2, #185a9d);
            color: white;
        }

        .main {
            padding: 20px;
            text-align: center;
        }

        .header h1 {
            margin: 0;
        }

        .header p {
            opacity: 0.8;
        }

        .process {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            margin: 30px 0;
            gap: 10px;
        }

        .step {
            background: rgba(255,255,255,0.2);
            padding: 10px 15px;
            border-radius: 20px;
            font-size: 14px;
        }

        .active {
            background: #00ffcc;
            color: black;
            font-weight: bold;
        }

        .arrow {
            font-size: 20px;
        }

        .cards {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .card {
            background: white;
            color: black;
            width: 250px;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            transition: 0.3s;
        }

        .card:hover {
            transform: scale(1.05);
        }

        .card h3 {
            margin-bottom: 10px;
        }

        .card button {
            padding: 10px;
            width: 100%;
            border: none;
            background: #185a9d;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        .card button:hover {
            background: #43cea2;
        }
    </style>
</head>

<body>

<div class="main">

    <!-- HEADER -->
    <div class="header">
        <h1>🌿 PMFBY Farmer Dashboard</h1>
        <p>Smart Crop Insurance System</p>
    </div>

    <!-- PROCESS FLOW -->
    <div class="process">
        <div class="step active">Login</div>
        <div class="arrow">→</div>
        <div class="step">Upload Image</div>
        <div class="arrow">→</div>
        <div class="step">Damage Detect</div>
        <div class="arrow">→</div>
        <div class="step">Apply Claim</div>
        <div class="arrow">→</div>
        <div class="step">Insurance</div>
        <div class="arrow">→</div>
        <div class="step">Bank</div>
    </div>

    <!-- CARDS -->
    <div class="cards">

        <div class="card">
            <h3>📤 Upload Crop Image</h3>
            <p>Detect crop damage using AI</p>
            <button onclick="goToUpload()">Upload Now</button>
        </div>

        <div class="card">
            <h3>📝 Apply Claim</h3>
            <p>Fill crop damage claim form</p>
            <button onclick="goToApply()">Apply Now</button>
        </div>

        <div class="card">
            <h3>📊 Application Status</h3>
            <p>Track your claim progress</p>
            <button onclick="goToStatus()">View Status</button>
        </div>

    </div>

</div>

<script>
function goToUpload() {
    window.location = "upload.html";   // upload page (already hai)
}

function goToApply() {
    window.location = "claim.html";   // same form reuse
}

function goToStatus() {
    window.location = "status.html";  // status page
}
</script>

</body>
</html>
