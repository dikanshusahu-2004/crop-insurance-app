<!DOCTYPE html>
<html>

<head>
<title>Bank Verification</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{background:#f5f7fa;}
.card{border-radius:12px;}
img{border-radius:10px;margin-top:10px;}
</style>

</head>

<body>

<div class="container mt-4">
<div class="card shadow p-4">

<h3 class="text-primary mb-3">🏦 Bank Verification</h3>

<h5>Farmer Details</h5>
<p><b>Name:</b> <span id="name"></span></p>
<p><b>Mobile:</b> <span id="mobile"></span></p>


<h5 class="text-warning">Land Details</h5>
<p><b>Land Area:</b> <span id="land"></span></p>


<h5 class="text-info">Bank Details</h5>
<p><b>Bank:</b> <span id="bank"></span></p>
<p><b>Account:</b> <span id="account"></span></p>
<p><b>IFSC:</b> <span id="ifsc"></span></p>

<h5 class="text-dark">Insurance Details</h5>
<p><b>Policy:</b> <span id="policy"></span></p>
<p><b>Sum Insured:</b> <span id="sum"></span></p>
<hr>

<h5>Crop Info</h5>
<p><b>Crop:</b> <span id="crop"></span></p>

<hr>

<h5 class="text-danger">Farmer Image</h5>
<img id="farmerImage" width="250">

<h5 class="text-primary mt-3">Patwari Image</h5>
<img id="patwariImage" width="250">

<hr>



<hr>

<button onclick="approve()" class="btn btn-success w-100 mt-2">
Approve Payment
</button>

<a href="bank-dashboard.html" class="btn btn-secondary w-100 mt-2">
Back
</a>

</div>
</div>

<script>

const id = localStorage.getItem("claimId");

async function loadDetails(){

  const res = await fetch("https://crop-insurance-app.onrender.com/api/claim");
  const data = await res.json();

  const item = data.find(x => x._id === id);

  if (!item) {
    alert("Data not found ❌");
    return;
  }

  console.log("Farmer:", item.image);
  console.log("Patwari:", item.verify_image);

  document.getElementById("name").innerText = item.name;
  document.getElementById("mobile").innerText = item.mobile;
  document.getElementById("account").innerText = item.account_number;
  document.getElementById("ifsc").innerText = item.ifsc_code;
  document.getElementById("crop").innerText = item.crop_name;

   document.getElementById("land").innerText = item.land_area;
    

    document.getElementById("bank").innerText = item.bank_name;
   

    document.getElementById("policy").innerText = item.policy_number;
    document.getElementById("sum").innerText = item.sum_insured;

  const baseURL = "https://crop-insurance-app.onrender.com";

  // Farmer Image
  if (item.image) {
    document.getElementById("farmerImage").src =
      baseURL + "/uploads/" + item.image;
  }

  // Patwari Image
  if (item.verify_image) {
    document.getElementById("patwariImage").src =
      baseURL + "/uploads/" + item.verify_image;
  }

  
}


// ✅ OUTSIDE FUNCTION
async function approve(){

  await fetch(
    `https://crop-insurance-app.onrender.com/api/claim/bank/${id}`,
    { method: "PUT" }
  );

  alert("Payment Approved 💰");
  window.location.href = "bank-dashboard.html";
}

loadDetails();

</script>

</body>
</html>
