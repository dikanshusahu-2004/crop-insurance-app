<!DOCTYPE html>
<html>

<head>
    <title>Patwari Verification</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body { background: #f5f7fa; }
        .card { border-radius: 12px; }
        img { border-radius: 10px; margin-top:10px; }
    </style>

</head>

<body>

<div class="container mt-4">
<div class="card shadow p-4">

<h3 class="text-primary mb-3">🔍 Claim Verification</h3>

<!-- Farmer Details -->
<div class="row">
    <div class="col-md-6">
        <h5 class="text-success">Farmer Details</h5>
        <p><b>Name:</b> <span id="name"></span></p>
        <p><b>Mobile:</b> <span id="mobile"></span></p>
        <p><b>Village:</b> <span id="village"></span></p>
        <p><b>District:</b> <span id="district"></span></p>
    </div>

    <div class="col-md-6">
        <h5 class="text-success">Crop Details</h5>
        <p><b>Crop:</b> <span id="crop"></span></p>
        <p><b>Season:</b> <span id="season"></span></p>
    </div>

    <div>
         <h5 class="text-warning">Land Details</h5>
         <p><b>Land Area:</b> <span id="land"></span></p>

        <h5 class="text-info">Bank Details</h5>
        <p><b>Bank:</b> <span id="bank"></span></p>
        <p><b>Account:</b> <span id="account"></span></p>
        <p><b>IFSC:</b> <span id="ifsc"></span></p>

        <h5 class="text-dark">Insurance Details</h5>
        <p><b>Policy:</b> <span id="policy"></span></p>
        <p><b>Sum Insured:</b> <span id="sum"></span></p>
</div>
</div>
<hr>

<!-- Farmer Image -->
<h5 class="text-danger">Farmer Uploaded Image</h5>
<img id="farmerImage" width="250">

<hr>

<!-- Survey Image -->
<h5 class="text-primary">Patwari Survey Image</h5>
<input type="file" name="verify_image" id="verifyImage" class="form-control mb-2">

<img id="preview" width="250">

<hr>

<!-- Notes -->
<label>Survey Notes</label>
<textarea id="notesInput" class="form-control"></textarea>

<label class="mt-2">Actual Yield</label>
<input type="number" id="yieldInput" class="form-control">

<!-- Buttons -->
<button onclick="approve()" class="btn btn-success mt-3 w-100">
    Approve Claim
</button>

<button onclick="reject()" class="btn btn-danger mt-2 w-100">
    Reject Claim
</button>

<a href="patwari-dashboard.html" class="btn btn-secondary mt-2 w-100">
    Back
</a>

</div>
</div>

<script>

// ✅ ID localStorage से लो (तुम्हारे dashboard से)
const id = localStorage.getItem("claimId");

if (!id) {
    alert("Invalid ID ❌");
}

// 🔥 LOAD DATA
async function loadDetails(){

    const res = await fetch("https://crop-insurance-app.onrender.com/api/claim");
    const data = await res.json();

    const item = data.find(x => x._id === id);
    if (!item) {
  alert("Data not found ❌");
  return;
}

    document.getElementById("name").innerText = item.name;
    document.getElementById("mobile").innerText = item.mobile;
    document.getElementById("village").innerText = item.village;
    document.getElementById("district").innerText = item.district;

    document.getElementById("crop").innerText = item.crop_name;
    document.getElementById("season").innerText = item.season;
     
    document.getElementById("land").innerText = item.land_area;
  

    document.getElementById("bank").innerText = item.bank_name;
    document.getElementById("account").innerText = item.account_number;
    document.getElementById("ifsc").innerText = item.ifsc_code;

    document.getElementById("policy").innerText = item.policy_number;
    document.getElementById("sum").innerText = item.sum_insured;

    const baseURL = "https://crop-insurance-app.onrender.com";

document.getElementById("farmerImage").src =
baseURL + "/uploads/" + item.image;
    console.log("Farmer Image:", item.image);
}

// 🔥 IMAGE PREVIEW
document.getElementById("verifyImage").addEventListener("change", function(e){
    const file = e.target.files[0];
    if(file){
        document.getElementById("preview").src = URL.createObjectURL(file);
    }
});

// ✅ APPROVE WITH GPS
async function approve() {

  const file = document.getElementById("verifyImage").files[0];

  const notes = document.getElementById("notesInput").value;
  const yieldVal = document.getElementById("yieldInput").value;

  if (!file) {
    alert("Upload survey image ❌");
    return;
  }

  const formData = new FormData();
  formData.append("verify_image", file);

  formData.append("patwariNotes", notes);
  formData.append("actualYield", yieldVal);

  navigator.geolocation.getCurrentPosition(async (pos) => {

    formData.append("lat", pos.coords.latitude);
    formData.append("lon", pos.coords.longitude);

   await fetch(`https://crop-insurance-app.onrender.com/api/claim/patwari/${id}`, {
  method: "PUT",
  body: formData
});

    alert("Patwari Verified ✅");
window.location.href = "patwari-dashboard.html";

  });

}

// ❌ REJECT
async function reject(){

    await fetch(
        `https://crop-insurance-app.onrender.com/api/claim/patwari/${id}`,
        {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                status: "Rejected"
            })
        }
    );

    alert("Claim Rejected ❌");
    window.location.href = "patwari-dashboard.html";
}

loadDetails();

</script>

</body>
</html>
