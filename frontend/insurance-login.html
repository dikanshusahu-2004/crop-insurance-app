<!DOCTYPE html>
<html>

<head>
  <title>Insurance Login</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: linear-gradient(to right, #ff9966, #ff5e62);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .card {
      border-radius: 20px;
      padding: 30px;
      width: 350px;
    }

    .title {
      font-weight: bold;
      text-align: center;
      margin-bottom: 20px;
    }

    .btn-custom {
      background: #ff5e62;
      color: white;
      border-radius: 10px;
    }

    .btn-custom:hover {
      background: #e0484d;
    }
  </style>

</head>

<body>

  <div class="card shadow">

    <h3 class="title text-danger">🏢 Insurance Login</h3>

    <input type="text" id="user" class="form-control mb-3" placeholder="Company ID">

    <input type="password" id="pass" class="form-control mb-3" placeholder="Password">

    <button class="btn btn-custom w-100" onclick="login()">
      Login
    </button>

  </div>

  <script>

    function login() {

      const user = document.getElementById("user").value;
      const pass = document.getElementById("pass").value;

      // 🔥 simple login (demo)
      if (user === "insurance" && pass === "1234") {

        localStorage.setItem("role", "insurance");

        window.location.href = "insurance-dashboard.html";

      } else {

        alert("❌ Invalid Credentials");

      }
    }

  </script>

</body>

</html>
