<!DOCTYPE html>
<html>

<head>
<title>Bank Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{background:#f5f7fa;}
.card{border-radius:12px;}
</style>

</head>

<body>

<div class="container mt-5">
<div class="card shadow p-4">

<h3 class="text-primary mb-3">🏦 Bank Dashboard</h3>

<table class="table table-bordered text-center">

<thead class="table-dark">
<tr>
<th>Name</th>
<th>Account</th>
<th>Insurance Status</th>
<th>Bank Status</th>
<th>Action</th>
</tr>
</thead>

<tbody id="data"></tbody>

</table>

</div>
</div>

<script>

async function loadData(){

  const res = await fetch("https://crop-insurance-app.onrender.com/api/claim");
  const data = await res.json();

  let output = "";

  data.forEach(item => {

    // 🔥 only insurance approved
    if(item.status.insurance === "Approved"){

      output += `
      <tr>
        <td>${item.name}</td>
        <td>${item.account_number}</td>

        <td class="text-success">${item.status.insurance}</td>

        <td class="${item.status.bank === "Approved" ? "text-success" : "text-warning"}">
          ${item.status.bank}
        </td>

        <td>
          <button class="btn btn-primary"
            onclick="view('${item._id}')">
            Verify
          </button>
        </td>
      </tr>
      `;
    }

  });

  document.getElementById("data").innerHTML = output;
}

function view(id){
  localStorage.setItem("claimId", id);
  window.location.href = "bank-verify.html";
}

loadData();

</script>

</body>
</html>
