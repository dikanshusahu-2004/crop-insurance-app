<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
</head>
<body style="text-align:center; margin-top:50px;">

  <h2>Login</h2>

  <input type="text" id="mobile" placeholder="Mobile"><br><br>
  <input type="password" id="password" placeholder="Password"><br><br>

  <button onclick="login()">Login</button>

<script>
async function login() {
  const mobile = document.getElementById("mobile").value;
  const password = document.getElementById("password").value;

  const res = await fetch("http://localhost:5000/api/auth/login", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ mobile, password })
  });

  const data = await res.json();

  if (res.ok) {
    alert("Login Success ✅");

    // 👉 role based redirect
    if (data.user.role === "farmer") {
      window.location = "farmer.html";
    } else if (data.user.role === "patwari") {
      window.location = "patwari.html";
    } else if (data.user.role === "insurance") {
      window.location = "insurance.html";
    } else if (data.user.role === "bank") {
      window.location = "bank.html";
    }

  } else {
    alert(data.message);
  }
}
</script>

</body>
</html>
