<!DOCTYPE html>
<html>
<head>
  <title>Claim Form</title>
</head>
<body>

<h2>Crop Insurance Claim</h2>

<form id="claimForm">
  <input type="text" name="name" placeholder="Name" required><br><br>
  <input type="text" name="mobile" placeholder="Mobile" required><br><br>
  <input type="text" name="aadhaar" placeholder="Aadhaar" required><br><br>

  <button type="submit">Submit</button>
</form>

<p id="result"></p>

<script>
const form = document.getElementById("claimForm");

form.addEventListener("submit", async function(e) {
  e.preventDefault();

  const data = {
    name: form.name.value,
    mobile: form.mobile.value,
    aadhaar: form.aadhaar.value,
    farmerId: "12345"
  };

  try {
    const res = await fetch("https://YOUR-RENDER-URL/api/app/create", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(data)
    });

    const result = await res.json();

    document.getElementById("result").innerText = result.message;

  } catch (err) {
    console.log(err);
  }
});
</script>

</body>
</html>
