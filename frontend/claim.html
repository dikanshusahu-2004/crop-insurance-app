<!DOCTYPE html>
<html>
<head>
  <title>Claim Form</title>
</head>
<body>

<h2>Crop Insurance Claim</h2>

<form id="claimForm">
  <input type="text" name="name" placeholder="Name" required><br><br>
  <input type="text" name="mobile" placeholder="Mobile" required><br><br>
  <input type="text" name="aadhaar" placeholder="Aadhaar" required><br><br>

  <button type="submit">Submit</button>
</form>

<p id="result"></p>

<script>
const form = document.getElementById("claimForm");

form.addEventListener("submit", async function(e) {
  e.preventDefault();

  const formData = new FormData(form);

  const farmerId = localStorage.getItem("farmerId") || "12345";
  formData.append("farmerId", farmerId);

  try {
    const res = await fetch("https://crop-insurance-app.onrender.com/api/app/create", {
      method: "POST",
      body: formData
    });

    const data = await res.json();
    console.log("RESPONSE:", data);

    alert("Application Submitted ✅");

    window.location.href = "status.html";
  } catch (err) {
    console.log(err);
    alert("Error submitting form ❌");
  }
});
</script>

</body>
</html>
