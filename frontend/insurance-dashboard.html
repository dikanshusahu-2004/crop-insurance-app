<!DOCTYPE html>
<html>
<head>
<title>Insurance Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body { background: linear-gradient(to right,#fdfbfb,#ebedee); }
.card { border-radius:15px; }
.approved { color: green; font-weight: bold; }
.pending { color: orange; font-weight: bold; }
</style>

</head>

<body>

<div class="container mt-5">
<div class="card shadow p-4">

<h3 class="text-primary mb-3">🏢 Insurance Dashboard</h3>

<table class="table table-bordered text-center">

<thead class="table-dark">
<tr>
<th>Name</th>
<th>Village</th>
<th>Patwari Status</th>
<th>Insurance Status</th>
<th>Action</th>
</tr>
</thead>

<tbody id="data"></tbody>

</table>

</div>
</div>

<script>

async function loadData(){

  const res = await fetch("https://crop-insurance-app.onrender.com/api/claim");
  const data = await res.json();

  let output = "";

  data.forEach(item => {

    // 🔥 only show patwari approved
    if(item.status.patwari === "Approved"){

      output += `
        <tr>
          <td>${item.name}</td>
          <td>${item.village}</td>

          <td class="approved">${item.status.patwari}</td>

          <td class="${item.status.insurance === "Approved" ? "approved" : "pending"}">
            ${item.status.insurance}
          </td>

          <td>
            <button class="btn btn-primary"
              onclick="view('${item._id}')">
              View
            </button>
          </td>
        </tr>
      `;
    }

  });

  document.getElementById("data").innerHTML = output;
}

function view(id){
  window.location.href = `insurance-verify.html?id=${id}`;
}

loadData();

</script>

</body>
</html>
