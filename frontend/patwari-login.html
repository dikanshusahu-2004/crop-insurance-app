<!DOCTYPE html>
<html>

<head>
  <title>Patwari Login</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: linear-gradient(to right, #56ccf2, #2f80ed);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .card {
      border-radius: 20px;
      padding: 30px;
      width: 350px;
    }

    .title {
      font-weight: bold;
      text-align: center;
      margin-bottom: 20px;
    }

    .btn-custom {
      background: #2f80ed;
      color: white;
      border-radius: 10px;
    }

    .btn-custom:hover {
      background: #1c5ed6;
    }
  </style>

</head>

<body>

  <div class="card shadow">

    <h3 class="title text-primary">👨‍🌾 Patwari Login</h3>

    <input type="text" id="user" class="form-control mb-3" placeholder="Username">

    <input type="password" id="pass" class="form-control mb-3" placeholder="Password">

    <button class="btn btn-custom w-100" onclick="login()">
      Login
    </button>

  </div>

  <script>
    function login() {

      const user = document.getElementById("user").value;
      const pass = document.getElementById("pass").value;

      if (user === "patwari" && pass === "1234") {
        localStorage.setItem("role", "patwari");
        window.location.href = "patwari-dashboard.html";
      } else {
        alert("❌ Invalid Username or Password");
      }
    }
  </script>

</body>

</html>
