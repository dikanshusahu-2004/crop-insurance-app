<!DOCTYPE html>
<html>

<head>
<title>Bank Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
  background: linear-gradient(to right,#36d1dc,#5b86e5);
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}
.card{
  border-radius:20px;
  padding:30px;
  width:350px;
}
.btn-custom{
  background:#5b86e5;
  color:white;
}
</style>

</head>

<body>

<div class="card shadow">
<h3 class="text-primary text-center mb-3">🏦 Bank Login</h3>

<input type="text" id="user" class="form-control mb-3" placeholder="Bank ID">
<input type="password" id="pass" class="form-control mb-3" placeholder="Password">

<button onclick="login()" class="btn btn-custom w-100">Login</button>

</div>

<script>

function login(){

  const user = document.getElementById("user").value;
  const pass = document.getElementById("pass").value;

  if(user === "bank" && pass === "1234"){
    localStorage.setItem("role","bank");
    window.location.href = "bank-dashboard.html";
  }else{
    alert("❌ Invalid login");
  }
}

</script>

</body>
</html>
